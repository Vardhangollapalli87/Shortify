services:
  - type: web
    name: shortify-api
    env: docker
    rootDir: backend
    plan: starter
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 30d
      - key: REFRESH_TOKEN_ROTATION_GRACE_SECONDS
        value: 10
      - key: CORS_ORIGINS
        sync: false
      - key: CLIENT_URL
        sync: false
      - key: CLIENT_PASSWORD_RESET_URL
        sync: false
      - key: CLIENT_OAUTH_SUCCESS_URL
        sync: false
      - key: CLIENT_OAUTH_FAILURE_URL
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_CALLBACK_URL
        sync: false
      - key: REFRESH_TOKEN_COOKIE_NAME
        value: shortify_refresh_token
      - key: GOOGLE_OAUTH_STATE_COOKIE_NAME
        value: shortify_google_oauth_state
      - key: HEALTHCHECK_HOST
        sync: false
      - key: HEALTHCHECK_PATH
        sync: false
